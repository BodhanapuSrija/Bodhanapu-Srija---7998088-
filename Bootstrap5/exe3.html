<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Responsive Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h2 class="mb-4">3. Responsive Grid Layout</h2>
        <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="p-4 bg-primary text-white border rounded">
                    <h5>Column 1</h5>
                    <p>Stacks on mobile, stays 2-per-row on tablets, splits to 3-per-row on desktop.</p>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="p-4 bg-secondary text-white border rounded">
                    <h5>Column 2</h5>
                    <p>Stacks on mobile, stays 2-per-row on tablets, splits to 3-per-row on desktop.</p>
                </div>
            </div>
            <div class="col-12 col-md-12 col-lg-4">
                <div class="p-4 bg-success text-white border rounded">
                    <h5>Column 3</h5>
                    <p>Stacks on mobile, wraps wide on tablets, splits to 3-per-row on desktop.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
