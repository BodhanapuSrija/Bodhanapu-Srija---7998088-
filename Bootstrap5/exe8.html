<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Forms Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5" style="max-width: 600px;">
        <h2>8. Form Control Frameworks</h2>
        <h4 class="mt-4 text-muted">Exercise 8.1: Full User Registration System</h4>
        <form class="p-4 border rounded mb-5 bg-light">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label class="form-label">Create Custom Username Alias</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" class="form-control" placeholder="uniquehandle">
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="termsCheck">
                <label class="form-check-label" for="termsCheck">Agree to application Terms of Service</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Complete Account Creation</button>
        </form>
        <h4 class="text-muted">Exercise 8.2: Floating Authentication Module</h4>
        <form class="p-4 border rounded shadow-sm">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
                <label for="floatingEmail">Email Address Input</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPass" placeholder="Password">
                <label for="floatingPass">Secure Gateway Password</label>
            </div>
            <button type="submit" class="btn btn-dark w-100">Secure Workspace Entry</button>
        </form>
    </div>
</body>
</html>
