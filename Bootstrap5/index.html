<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Local Files Assignment</title>

    <!-- Local Bootstrap CSS -->
    <link rel="stylesheet"
          href="css/bootstrap.min.css">

    <style>

        body{
            background-color: #f0f8ff;
        }

        .main-box{
            background: white;
            border-radius: 20px;
            padding: 50px;
        }

    </style>

</head>

<body>

    <div class="container py-5">

        <div class="main-box shadow-lg">

            <div class="text-center">

                <h1 class="text-primary fw-bold">
                    Bootstrap Local Setup
                </h1>

                <p class="fs-5 mt-3">
                    Using downloaded Bootstrap files
                </p>

                <button class="btn btn-success btn-lg mt-3">
                    Start Learning
                </button>

            </div>

            <div class="row mt-5">

                <div class="col-lg-6">

                    <div class="alert alert-warning">

                        <h4>
                            Offline Support
                        </h4>

                        <p>
                            Bootstrap works without internet.
                        </p>

                    </div>

                </div>

                <div class="col-lg-6">

                    <div class="alert alert-info">

                        <h4>
                            Fast Performance
                        </h4>

                        <p>
                            Local files load quickly.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Local Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
