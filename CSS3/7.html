<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Styling</title>
<style>
body{
    font-family:Arial;
    background:#eef2f7;
    text-align:center;
}
table{
    width:70%;
    margin:40px auto;
    border-collapse:collapse;
    background:white;
}
th,td{
    border:1px solid #555;
    padding:15px;
    text-align:center;
}
th{
    background:#0056b3;
    color:white;
}
tr:nth-child(even){
    background:#dfe9f3;
}
h1{
    color:#003366;
    margin-top:20px;
}
</style>
</head>
<body>
<h1>
Community Events Schedule
</h1>
<table>
<tr>
<th>Event</th>
<th>Date</th>
<th>Location</th>
</tr>
<tr>
<td>Music Festival</td>
<td>10 Aug</td>
<td>City Hall</td>
</tr>
<tr>
<td>Food Carnival</td>
<td>15 Aug</td>
<td>Central Park</td>
</tr>
<tr>
<td>Book Fair</td>
<td>20 Aug</td>
<td>Library</td>
</tr>
<tr>
<td>Community Meetup</td>
<td>25 Aug</td>
<td>Town Center</td>
</tr>
</table>
</body>
</html>
