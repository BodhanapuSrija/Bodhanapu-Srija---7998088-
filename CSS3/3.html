<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Selectors Playground</title>

<style>

/* Universal Selector */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* Body Style */
body{
    background:#eef2f7;
    font-family:Arial;
    text-align:center;
    padding:20px;
}


/* ID Selector */
#mainHeader{
    background:#007BFF;
    color:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}


/* Element Selector */
h2{
    color:darkblue;
    margin:15px 0;
}


/* Class Selector */
.eventCard{
    background:white;
    width:320px;
    margin:20px auto;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}


/* Grouping Selector */
h3,p{
    color:#444;
    margin-top:10px;
}

img{
    width:100%;
    border-radius:10px;
}

</style>

</head>

<body>

<div id="mainHeader">

<h1>
Local Community Event Portal
</h1>

</div>

<h2>
Upcoming Events
</h2>

<div class="eventCard">

<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400">

<h3>
Music Festival
</h3>

<p>
Enjoy live music and food stalls this weekend.
</p>

</div>

<div class="eventCard">

<img src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=400">

<h3>
Community Meetup
</h3>

<p>
Meet local people and participate in activities.
</p>

</div>

</body>
</html>
