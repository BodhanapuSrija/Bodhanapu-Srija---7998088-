<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>CSS Comments Demo</title>

<style>

/* Page background style */
body{
    background:#f4f4f4;
    font-family:Arial;
    text-align:center;
}


/* Style for main heading */
h1{
    color:darkblue;
    margin-top:20px;
}


/* Style for event box */
.event-box{
    background:white;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}


/* Style for event image */
.event-box img{
    width:100%;
    border-radius:10px;
}


/* Style for description */
p{
    color:#444;
}


/* Style for main CTA button */
.cta-button{
    background-color:#007BFF;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}

</style>

</head>

<body>

<h1>
Community Event Portal
</h1>

<div class="event-box">

<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400">

<p>
Join our local cultural event this weekend.
</p>

<button class="cta-button">
Register
</button>

</div>

</body>
</html>
